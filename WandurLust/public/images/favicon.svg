<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#fe424d"/>
  
  <!-- Compass Circle -->
  <circle cx="50" cy="50" r="35" fill="white" stroke="#fe424d" stroke-width="2"/>
  
  <!-- Compass Points -->
  <!-- North -->
  <path d="M50 20 L45 35 L50 32 L55 35 Z" fill="#fe424d"/>
  <!-- South -->
  <path d="M50 80 L45 65 L50 68 L55 65 Z" fill="#fe424d"/>
  <!-- East -->
  <path d="M80 50 L65 45 L68 50 L65 55 Z" fill="#fe424d"/>
  <!-- West -->
  <path d="M20 50 L35 45 L32 50 L35 55 Z" fill="#fe424d"/>
  
  <!-- Center Circle -->
  <circle cx="50" cy="50" r="8" fill="#fe424d"/>
  <circle cx="50" cy="50" r="4" fill="white"/>
  
  <!-- Decorative Ring -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#fe424d" stroke-width="1" opacity="0.3"/>
</svg>
